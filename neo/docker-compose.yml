services:
  postgres:
    image: postgres:15-alpine
    container_name: postgres-adventureworks
    restart: always
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: Adventureworks
    ports:
      - "5432:5432"
    volumes:
      - pgdata_adventure:/var/lib/postgresql/data

  pgvector:
    image: ankane/pgvector:latest
    container_name: pgvector-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${PGVECTOR_PASSWORD}
      POSTGRES_DB: vectordb
    ports:
      - "5433:5432"
    volumes:
      - pgdata_vector:/var/lib/postgresql/data

  redis:
    image: redis:latest
    container_name: redis-cache
    restart: always
    ports:
      - "6379:6379"

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: always
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  backend:
    build: ./
    container_name: springboot-app
    restart: always
    env_file:
      - .env
    depends_on:
      - postgres
      - pgvector
      - redis
      - ollama
    ports:
      - "8080:8080"   # App Port
      - "5005:5005"
    environment:
      # Primary datasource → AdventureWorks
      SPRING_DATASOURCE_URL: ${DB_URL}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}

      JAVA_TOOL_OPTIONS: "-agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005"

      # Secondary datasource → pgvector (using placeholders or .env values)
      SPRING_VECTOR_DATASOURCE_URL: jdbc:postgresql://pgvector:5432/vectordb
      SPRING_VECTOR_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_VECTOR_DATASOURCE_PASSWORD: ${PGVECTOR_PASSWORD}

      REDIS_HOST: redis
      OLLAMA_BASE_URL: http://ollama:11434

volumes:
  pgdata_adventure:
  pgdata_vector:
  ollama_data: